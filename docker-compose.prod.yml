services:
  api:
    build:
      context: .
    image: openklas-backend:prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://openklas:${DB_PASSWORD}@postgres:5432/openklas
      REDIS_URL: redis://redis:6379/0
    mem_limit: 3g
    memswap_limit: 3g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: openklas
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: openklas
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports: []
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openklas -d openklas"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api

  ollama:
    profiles: ["never"]

volumes:
  pg-data:
  caddy-data:
  caddy-config:
